<!DOCTYPE html>

<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>FBS Mobile WhatsApp Redirect State</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#eebd2b",
                        "background-light": "#f8f7f6",
                        "background-dark": "#000000",
                        "platinum": "#e5e4e2",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                    boxShadow: {
                        "glow": "0 0 50px -10px rgba(238, 189, 43, 0.3)",
                        "halo": "0 0 80px 20px rgba(238, 189, 43, 0.15)",
                    }
                },
            },
        }
    </script>
    <style>
        .gold-gradient-text {
            background: linear-gradient(135deg, #eebd2b 0%, #fff8dc 50%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .halo-bg {
            background: radial-gradient(circle at center, rgba(238, 189, 43, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    <!-- Ambient Glow Background -->
    <div class="absolute inset-0 z-0 pointer-events-none halo-bg"></div>
    <!-- Main Container -->
    <div class="relative z-10 w-full max-w-[480px] min-h-screen flex flex-col bg-transparent">
        <!-- Header -->
        <header class="flex items-center justify-center w-full px-6 py-6 mt-4">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-3xl">currency_bitcoin</span>
                <h2 class="text-2xl font-extrabold tracking-tighter gold-gradient-text">₿ROK€R$</h2>
            </div>
        </header>
        <!-- Main Content -->
        <main class="flex-1 flex flex-col items-center justify-center px-8 gap-10">
            <!-- Icon/Animation Section -->
            <div class="relative flex items-center justify-center">
                <!-- Outer Halo Ring -->
                <div class="absolute w-40 h-40 rounded-full border border-primary/20 animate-pulse"></div>
                <div class="absolute w-32 h-32 rounded-full border border-primary/40"></div>
                <!-- Center Icon -->
                <div
                    class="relative z-10 flex items-center justify-center w-24 h-24 rounded-full bg-primary/10 shadow-glow border border-primary/50">
                    <span class="material-symbols-outlined text-primary text-5xl">check_circle</span>
                </div>
            </div>
            <!-- Text Content -->
            <div class="flex flex-col items-center text-center gap-4">
                <h1 class="text-primary text-2xl font-bold leading-tight tracking-tight">
                    Conectando con un Bróker...
                </h1>
                <p class="text-slate-400 text-sm font-medium leading-relaxed max-w-[320px]">
                    Estamos abriendo WhatsApp para procesar tu transferencia de manera segura.
                </p>
            </div>
            <!-- Loading Indicator -->
            <div class="w-full max-w-[280px] flex flex-col gap-3">
                <div class="flex justify-between items-end px-1">
                    <span class="text-primary/80 text-xs font-semibold uppercase tracking-wider">Iniciando</span>
                    <span class="text-primary text-xs font-bold">75%</span>
                </div>
                <div class="h-1.5 w-full bg-primary/20 rounded-full overflow-hidden">
                    <div class="h-full bg-primary w-3/4 rounded-full shadow-[0_0_10px_rgba(238,189,43,0.8)] relative">
                        <div class="absolute inset-0 bg-white/30 w-full h-full opacity-20"></div>
                    </div>
                </div>
                <p class="text-center text-slate-500 text-xs mt-1">Por favor espera un momento</p>
            </div>
        </main>
        <!-- Footer / Fallback Action -->
        <footer class="p-8 w-full flex justify-center mb-6">
            <button
                class="group relative flex items-center justify-center gap-3 px-6 py-3.5 w-full max-w-[320px] rounded-xl border border-platinum/20 bg-white/5 hover:bg-white/10 transition-all duration-300">
                <span
                    class="material-symbols-outlined text-platinum/70 group-hover:text-primary transition-colors text-xl">open_in_new</span>
                <span
                    class="text-platinum text-sm font-semibold tracking-wide group-hover:text-white transition-colors">Si
                    no abre, haz clic aquí</span>
            </button>
        </footer>
    </div>
</body>

</html>
