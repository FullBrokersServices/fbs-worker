<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Candle Animation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(ellipse at bottom, #1a0f3d 0%, #0a0520 100%);
      position: relative;
      overflow: hidden;
      min-height: 100vh;
    }

    /* Galaxy background layers */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(124, 58, 237, 0.08) 0%, transparent 40%);
      animation: nebula-drift 20s ease-in-out infinite alternate;
    }

    @keyframes nebula-drift {
      0% {
        transform: translate(0, 0) scale(1);
      }
      100% {
        transform: translate(30px, -20px) scale(1.1);
      }
    }

    /* Animated stars */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }

    .star:nth-child(1) { width: 2px; height: 2px; top: 10%; left: 15%; animation-delay: 0s; }
    .star:nth-child(2) { width: 1px; height: 1px; top: 20%; left: 80%; animation-delay: 0.5s; }
    .star:nth-child(3) { width: 3px; height: 3px; top: 30%; left: 40%; animation-delay: 1s; box-shadow: 0 0 4px #8b5cf6; }
    .star:nth-child(4) { width: 1px; height: 1px; top: 15%; left: 60%; animation-delay: 1.5s; }
    .star:nth-child(5) { width: 2px; height: 2px; top: 50%; left: 25%; animation-delay: 2s; }
    .star:nth-child(6) { width: 1px; height: 1px; top: 60%; left: 70%; animation-delay: 0.8s; }
    .star:nth-child(7) { width: 2px; height: 2px; top: 70%; left: 90%; animation-delay: 1.2s; }
    .star:nth-child(8) { width: 3px; height: 3px; top: 40%; left: 10%; animation-delay: 2.5s; box-shadow: 0 0 4px #6366f1; }
    .star:nth-child(9) { width: 1px; height: 1px; top: 80%; left: 45%; animation-delay: 0.3s; }
    .star:nth-child(10) { width: 2px; height: 2px; top: 25%; left: 85%; animation-delay: 1.8s; }
    .star:nth-child(11) { width: 1px; height: 1px; top: 35%; left: 55%; animation-delay: 0.6s; }
    .star:nth-child(12) { width: 2px; height: 2px; top: 45%; left: 75%; animation-delay: 2.2s; }
    .star:nth-child(13) { width: 3px; height: 3px; top: 55%; left: 20%; animation-delay: 1.4s; box-shadow: 0 0 5px #a78bfa; }
    .star:nth-child(14) { width: 1px; height: 1px; top: 65%; left: 50%; animation-delay: 0.9s; }
    .star:nth-child(15) { width: 2px; height: 2px; top: 75%; left: 30%; animation-delay: 1.6s; }
    .star:nth-child(16) { width: 1px; height: 1px; top: 5%; left: 35%; animation-delay: 2.3s; }
    .star:nth-child(17) { width: 2px; height: 2px; top: 85%; left: 65%; animation-delay: 0.4s; }
    .star:nth-child(18) { width: 1px; height: 1px; top: 12%; left: 95%; animation-delay: 1.1s; }
    .star:nth-child(19) { width: 3px; height: 3px; top: 90%; left: 15%; animation-delay: 2.7s; box-shadow: 0 0 4px #8b5cf6; }
    .star:nth-child(20) { width: 2px; height: 2px; top: 22%; left: 48%; animation-delay: 0.7s; }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.3;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    /* Shooting stars */
    .shooting-star {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, #fff, transparent);
      animation: shoot 3s linear infinite;
    }

    .shooting-star:nth-child(21) {
      top: 15%;
      left: -100px;
      width: 100px;
      animation-delay: 2s;
    }

    .shooting-star:nth-child(22) {
      top: 60%;
      left: -150px;
      width: 120px;
      animation-delay: 5s;
    }

    @keyframes shoot {
      0% {
        transform: translateX(0) translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateX(1000px) translateY(300px);
        opacity: 0;
      }
    }

    .wrapper {
      position: absolute;
      left: 50%;
      top: 70%;
      transform: scale(1.5, 1.5) translate(-50%, -50%);
      z-index: 10;
    }

    .floor {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 350px;
      height: 5px;
      background: linear-gradient(90deg, #8b5cf6, #6366f1, #8b5cf6);
      transform: translate(-50%, -50%);
      box-shadow: 0px 0px 20px rgba(139, 92, 246, 0.8), 0px 2px 5px rgba(0, 0, 0, 0.5);
      z-index: 2;
    }

    .candles {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 250px;
      height: 150px;
      transform: translate(-50%, -100%);
      z-index: 1;
    }

    .candle1 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 35px;
      height: 100px;
      background: linear-gradient(to right, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
      border: 3px solid #8b5cf6;
      border-bottom: 0px;
      border-radius: 3px;
      transform-origin: center right;
      transform: translate(60%, -25%);
      box-shadow: -2px 0px 10px rgba(139, 92, 246, 0.5) inset, 
                  0 0 20px rgba(139, 92, 246, 0.3);
      animation: expand-body 3s infinite linear;
    }

    .candle1__stick, .candle2__stick {
      position: absolute;
      left: 50%;
      top: 0%;
      width: 3px;
      height: 15px;
      background: #8b5cf6;
      border-radius: 8px;
      transform: translate(-50%, -100%);
      box-shadow: 0 0 5px #8b5cf6;
    }

    .candle2__stick {
      height: 12px;
      transform-origin: bottom center;
      animation: stick-animation 3s infinite linear;
    }

    .candle1__eyes, .candle2__eyes {
      position: absolute;
      left: 50%;
      top: 0%;
      width: 35px;
      height: 30px;
      transform: translate(-50%, 0%);
    }

    .candle1__eyes-one {
      position: absolute;
      left: 30%;
      top: 20%;
      width: 5px;
      height: 5px;
      border-radius: 100%;
      background: #6366f1;
      transform: translate(-70%, 0%);
      animation: blink-eyes 3s infinite linear;
      box-shadow: 0 0 3px #6366f1;
    }

    .candle1__eyes-two {
      position: absolute;
      left: 70%;
      top: 20%;
      width: 5px;
      height: 5px;
      border-radius: 100%;
      background: #6366f1;
      transform: translate(-70%, 0%);
      animation: blink-eyes 3s infinite linear;
      box-shadow: 0 0 3px #6366f1;
    }

    .candle1__mouth {
      position: absolute;
      left: 40%;
      top: 20%;
      width: 0px;
      height: 0px;
      border-radius: 20px;
      background: #6366f1;
      transform: translate(-50%, -50%);
      animation: uff 3s infinite linear;
    }

    .candle__smoke-one {
      position: absolute;
      left: 30%;
      top: 50%;
      width: 30px;
      height: 3px;
      background: linear-gradient(90deg, rgba(139, 92, 246, 0.6), rgba(99, 102, 241, 0.4));
      transform: translate(-50%, -50%);
      animation: move-left 3s infinite linear;
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
    }

    .candle__smoke-two {
      position: absolute;
      left: 30%;
      top: 40%;
      width: 10px;
      height: 10px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.7), rgba(99, 102, 241, 0.5));
      transform: translate(-50%, -50%);
      animation: move-top 3s infinite linear;
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.6);
    }

    .candle2 {
      position: absolute;
      left: 20%;
      top: 65%;
      width: 42px;
      height: 60px;
      background: linear-gradient(to right, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
      border: 3px solid #8b5cf6;
      border-bottom: 0px;
      border-radius: 3px;
      transform: translate(60%, -15%);
      transform-origin: center right;
      box-shadow: -2px 0px 10px rgba(139, 92, 246, 0.5) inset,
                  0 0 20px rgba(139, 92, 246, 0.3);
      animation: shake-left 3s infinite linear;
    }

    .candle2__eyes-one {
      position: absolute;
      left: 30%;
      top: 50%;
      width: 5px;
      height: 5px;
      display: inline-block;
      border: 0px solid #6366f1;
      border-radius: 100%;
      float: left;
      background: #6366f1;
      transform: translate(-80%, 0%);
      animation: changeto-lower 3s infinite linear;
      box-shadow: 0 0 3px #6366f1;
    }

    .candle2__eyes-two {
      position: absolute;
      left: 70%;
      top: 50%;
      width: 5px;
      height: 5px;
      display: inline-block;
      border: 0px solid #6366f1;
      border-radius: 100%;
      float: left;
      background: #6366f1;
      transform: translate(-80%, 0%);
      animation: changeto-greater 3s infinite linear;
      box-shadow: 0 0 3px #6366f1;
    }

    .light__wave {
      position: absolute;
      top: 35%;
      left: 35%;
      width: 75px;
      height: 75px;
      border-radius: 100%;
      z-index: 0;
      transform: translate(-25%, -50%) scale(2.5, 2.5);
      border: 2px solid rgba(139, 92, 246, 0.3);
      animation: expand-light 3s infinite linear;
    }

    .candle2__fire {
      position: absolute;
      top: 50%;
      left: 40%;
      display: block;
      width: 16px;
      height: 20px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: linear-gradient(to top, #a78bfa, #c4b5fd);
      transform: translate(-50%, -50%);
      animation: dance-fire 3s infinite linear;
      box-shadow: 0 0 20px rgba(167, 139, 250, 0.8),
                  0 0 40px rgba(167, 139, 250, 0.5);
    }

    .sparkles-one, .sparkles-two {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #c4b5fd;
      border-radius: 50%;
      box-shadow: 0 0 10px #c4b5fd;
      animation: sparkle 3s infinite linear;
    }

    .sparkles-one {
      top: 30%;
      left: 35%;
      animation-delay: 0.5s;
    }

    .sparkles-two {
      top: 25%;
      left: 45%;
      animation-delay: 1s;
    }

    @keyframes sparkle {
      0%, 60%, 100% {
        opacity: 0;
        transform: scale(0);
      }
      90%, 95% {
        opacity: 1;
        transform: scale(1.5);
      }
    }

    @keyframes blink-eyes {
      0%, 35% {
        opacity: 1;
        transform: translate(-70%, 0%);
      }
      36%, 39% {
        opacity: 0;
        transform: translate(-70%, 0%);
      }
      40% {
        opacity: 1;
        transform: translate(-70%, 0%);
      }
      50%, 65% {
        transform: translate(-140%, 0%);
      }
      66% {
        transform: translate(-70%, 0%);
      }
    }

    @keyframes expand-body {
      0%, 40% {
        transform: scale(1, 1) translate(60%, -25%);
      }
      45%, 55% {
        transform: scale(1.1, 1.1) translate(60%, -28%);
      }
      60% {
        transform: scale(0.89, 0.89) translate(60%, -25%);
      }
      65% {
        transform: scale(1, 1) translate(60%, -25%);
      }
      70% {
        transform: scale(0.95, 0.95) translate(60%, -25%);
      }
      75% {
        transform: scale(1, 1) translate(60%, -25%);
      }
    }

    @keyframes uff {
      0%, 40% {
        width: 0px;
        height: 0px;
      }
      50%, 54% {
        width: 15px;
        height: 15px;
        left: 30%;
      }
      59% {
        width: 5px;
        height: 5px;
        left: 20%;
      }
      62% {
        width: 2px;
        height: 2px;
        left: 20%;
      }
      67% {
        width: 0px;
        height: 0px;
        left: 30%;
      }
    }

    @keyframes move-left {
      0%, 59%, 100% {
        width: 0px;
        left: 40%;
      }
      60% {
        width: 30px;
        left: 30%;
      }
      68% {
        width: 0px;
        left: 20%;
      }
    }

    @keyframes move-top {
      0%, 64%, 100% {
        width: 0px;
        height: 0px;
        top: 0%;
      }
      65% {
        width: 10px;
        height: 10px;
        top: 40%;
        left: 40%;
      }
      80% {
        width: 0px;
        height: 0px;
        top: 20%;
      }
    }

    @keyframes shake-left {
      0%, 40% {
        left: 20%;
        transform: translate(60%, -15%);
      }
      50%, 54% {
        left: 20%;
        transform: translate(60%, -15%);
      }
      59% {
        left: 20%;
        transform: translate(60%, -15%);
      }
      62% {
        left: 18%;
        transform: translate(60%, -15%);
      }
      65% {
        left: 21%;
        transform: translate(60%, -15%);
      }
      67% {
        left: 20%;
        transform: translate(60%, -15%);
      }
      75% {
        left: 20%;
        transform: scale(1.15, 0.85) translate(60%, -15%);
        background: linear-gradient(to right, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
        border-color: #8b5cf6;
      }
      91% {
        left: 20%;
        transform: scale(1.18, 0.82) translate(60%, -10%);
        background: linear-gradient(135deg, #7c3aed, #a78bfa);
        border-color: #7c3aed;
        box-shadow: -2px 0px 20px rgba(124, 58, 237, 0.8) inset,
                    0 0 30px rgba(124, 58, 237, 0.6);
      }
      92% {
        left: 20%;
        transform: scale(0.85, 1.15) translate(60%, -15%);
      }
      95% {
        left: 20%;
        transform: scale(1.05, 0.95) translate(60%, -15%);
      }
      97% {
        left: 20%;
        transform: scale(1, 1) translate(60%, -15%);
      }
    }

    @keyframes stick-animation {
      0%, 40% {
        left: 50%;
        top: 0%;
        transform: translate(-50%, -100%);
      }
      50%, 54% {
        left: 50%;
        top: 0%;
        transform: translate(-50%, -100%);
      }
      59% {
        left: 50%;
        top: 0%;
        transform: translate(-50%, -100%);
      }
      62% {
        left: 50%;
        top: 0%;
        transform: rotateZ(-15deg) translate(-50%, -100%);
      }
      65% {
        left: 50%;
        top: 0%;
        transform: rotateZ(15deg) translate(-50%, -100%);
      }
      70% {
        left: 50%;
        top: 0%;
        transform: rotateZ(-5deg) translate(-50%, -100%);
      }
      72% {
        left: 50%;
        top: 0%;
        transform: rotateZ(5deg) translate(-50%, -100%);
      }
      74%, 84% {
        left: 50%;
        top: 0%;
        transform: rotateZ(0deg) translate(-50%, -100%);
      }
      85% {
        transform: rotateZ(180deg) translate(0%, 120%);
      }
      92% {
        left: 50%;
        top: 0%;
        transform: translate(-50%, -100%);
      }
    }

    @keyframes expand-light {
      10%, 29%, 59%, 89% {
        transform: translate(-25%, -50%) scale(0, 0);
        border: 2px solid rgba(139, 92, 246, 0);
      }
      90%, 20%, 50% {
        transform: translate(-25%, -50%) scale(1, 1);
      }
      95%, 96%, 26%, 27%, 56%, 57% {
        transform: translate(-25%, -50%) scale(2, 2);
        border: 2px solid rgba(139, 92, 246, 0.6);
      }
      0%, 28%, 58%, 100% {
        transform: translate(-25%, -50%) scale(2.5, 2.5);
        border: 2px solid rgba(139, 92, 246, 0.3);
      }
    }

    @keyframes dance-fire {
      59%, 89% {
        left: 40%;
        width: 0px;
        height: 0px;
      }
      90%, 0%, 7%, 15%, 23%, 31%, 39%, 47%, 55% {
        left: 40.8%;
        width: 16px;
        height: 20px;
        background: linear-gradient(to top, #a78bfa, #c4b5fd);
        box-shadow: 0 0 20px rgba(167, 139, 250, 0.8);
      }
      94%, 3%, 11%, 19%, 27%, 35%, 43%, 51%, 58% {
        left: 41.2%;
        width: 16px;
        height: 20px;
        background: linear-gradient(to top, #8b5cf6, #a78bfa);
        box-shadow: 0 0 25px rgba(139, 92, 246, 0.9);
      }
    }

    @keyframes changeto-lower {
      0%, 70%, 90% {
        padding: 0px;
        display: inline-block;
        border-radius: 100%;
        background: #6366f1;
        border-width: 0 0 0 0;
        border: 0px solid #6366f1;
        transform: translate(-90%, 0%);
      }
      71%, 89% {
        background: none;
        border: solid #6366f1;
        border-radius: 0px;
        border-width: 0 2px 2px 0;
        display: inline-block;
        padding: 1px;
        float: left;
        transform-origin: bottom left;
        transform: rotate(-45deg) translate(-50%, -65%);
        box-shadow: 0 0 3px #6366f1;
      }
    }

    @keyframes changeto-greater {
      0%, 70%, 90% {
        top: 50%;
        padding: 0px;
        display: inline-block;
        border-radius: 100%;
        background: #6366f1;
        border-width: 0 0 0 0;
        border: 0px solid #6366f1;
        transform: translate(-80%, 0%);
      }
      71%, 89% {
        top: 30%;
        background: none;
        border: solid #6366f1;
        border-radius: 0px;
        border-width: 0 2px 2px 0;
        display: inline-block;
        padding: 1px;
        float: left;
        transform-origin: bottom left;
        transform: rotate(135deg) translate(-80%, 20%);
        box-shadow: 0 0 3px #6366f1;
      }
    }
  </style>
</head>
<body>
  <div class="stars">
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
  </div>

  <div class="wrapper">
    <div class="candles">
      <div class="light__wave"></div>
      <div class="candle1">
        <div class="candle1__body">
          <div class="candle1__eyes">
            <span class="candle1__eyes-one"></span>
            <span class="candle1__eyes-two"></span>
          </div>
          <div class="candle1__mouth"></div>
        </div>
        <div class="candle1__stick"></div>
      </div>
      
      <div class="candle2">
        <div class="candle2__body">
          <div class="candle2__eyes">
            <div class="candle2__eyes-one"></div>
            <div class="candle2__eyes-two"></div>
          </div>
        </div>
        <div class="candle2__stick"></div>
      </div>
      <div class="candle2__fire"></div>
      <div class="sparkles-one"></div>
      <div class="sparkles-two"></div>
      <div class="candle__smoke-one"></div>
      <div class="candle__smoke-two"></div>
    </div>
    <div class="floor"></div>
  </div>
</body>
</html>
